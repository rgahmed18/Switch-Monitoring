name: Regression Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: switch-monotoring/backend/pom.xml

      - name: Run backend tests + seuil global de couverture (15% minimum)
        working-directory: switch-monotoring/backend
        run: mvn -B verify

      - name: Verifier la couverture du code modifie par la PR (70% minimum)
        if: github.event_name == 'pull_request'
        working-directory: switch-monotoring/backend
        run: |
          git fetch origin ${{ github.base_ref }} --depth=50
          mvn -B verify -Pdiff-coverage -Ddiff-coverage.diffBase=refs/remotes/origin/${{ github.base_ref }}

      - name: Publish backend test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Tests
          path: 'switch-monotoring/backend/target/surefire-reports/*.xml'
          reporter: java-junit

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: switch-monotoring/backend/target/site/jacoco

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: switch-monotoring/frontend/package-lock.json

      - name: Install dependencies
        working-directory: switch-monotoring/frontend
        # --legacy-peer-deps : conflit de peer-deps preexistant entre ng2-charts@10
        # (exige @angular/cdk >=21) et Angular 18 utilise par le projet.
        run: npm ci --legacy-peer-deps

      - name: Run unit tests (headless)
        working-directory: switch-monotoring/frontend
        run: npx ng test --watch=false --browsers=ChromeHeadlessCI --code-coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: switch-monotoring/frontend/coverage
