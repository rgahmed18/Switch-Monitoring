server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/v1/ {
        proxy_pass http://backend:8080/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/stream/ {
        proxy_pass http://backend:8080/api/v1/stream/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 1h;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html reference les bundles hashes (main-XXXX.js) : il ne doit
    # jamais etre mis en cache par le navigateur, sinon un rebuild frontend
    # continue de servir l'ancien bundle jusqu'a un hard-refresh manuel.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
