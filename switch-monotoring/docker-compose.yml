services:
  # Oracle Database
  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    environment:
      ORACLE_PASSWORD: ${DB_PASSWORD:-PFE_SW_MON_PWD}
      APP_USER: ${DB_USERNAME:-PFE_SW_MON}
      APP_USER_PASSWORD: ${DB_PASSWORD:-PFE_SW_MON_PWD}
      LANG: C.utf8
      TZ: Africa/Casablanca
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./backend/src/main/resources/db/init/V0_0_0__Init_Admin_User.sql:/container-entrypoint-initdb.d/01_init_admin_user.sql:ro
      - ./backend/src/main/resources/db/init/V0_0_1__Create_Powercard_Tablespaces.sql:/container-entrypoint-initdb.d/02_create_tablespaces.sql:ro
      - ./backend/src/main/resources/db/init/V0_0_2__Grant_Powercard_Quotas.sql:/container-entrypoint-initdb.d/03_grant_quotas.sql:ro
      - ./backend/src/main/resources/db/migration/V3_0_0__Create_AUTHO_ACTIVITY_ADM.sql:/container-entrypoint-initdb.d/04_create_autho_activity_adm.sql:ro
      - ./backend/src/main/resources/db/migration/V3_0_1__Create_AUTHO_ACTIVITY_ADM_Indexes.sql:/container-entrypoint-initdb.d/05_create_indexes.sql:ro
      - ./backend/src/main/resources/db/migration/V3_0_2__Create_AUTHO_ACTIVITY_ADM_Views.sql:/container-entrypoint-initdb.d/06_create_views.sql:ro
      - ./backend/src/main/resources/db/migration/V3_0_3__Create_Intelligence_Views.sql:/container-entrypoint-initdb.d/07_create_intelligence_views.sql:ro
      - ./backend/src/main/resources/db/migration/V4_0_0__Create_Archive_Table.sql:/container-entrypoint-initdb.d/08_create_archive_table.sql:ro
      - ./backend/src/main/resources/db/migration/V5_0_0__PCI_DSS_PAN_Masking.sql:/container-entrypoint-initdb.d/09_pci_dss_pan_masking.sql:ro
      - ./backend/src/main/resources/db/migration/V6_0_0__Create_Alert_Sla_Socket_Tables.sql:/container-entrypoint-initdb.d/10_create_alert_sla_socket_tables.sql:ro
      - ./backend/src/main/resources/db/seed/inject_data.sql:/container-entrypoint-initdb.d/11_seed_data.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # Zookeeper (requis par Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
    ports:
      - "2181:2181"
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-logs:/var/lib/zookeeper/log

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka-data:/var/lib/kafka/data

  # Kafka UI - Interface web pour visualiser les topics et messages
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka

  # Load Generator — injecte les transactions de test dans Kafka
  # Lancer manuellement: docker compose run --rm load-generator
  load-generator:
    build:
      context: ./load-generator
      dockerfile: Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:29092
    command: >
      python transaction_generator.py
        --broker kafka:29092
        --total 100000
        --tps 200
    profiles:
      - load-test

  # Backend Spring Boot
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      TZ: Africa/Casablanca
      DB_URL: jdbc:oracle:thin:@//oracle:1521/FREEPDB1
      DB_USERNAME: ${DB_USERNAME:-PFE_SW_MON}
      DB_PASSWORD: ${DB_PASSWORD:-PFE_SW_MON_PWD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_STARTTLS_ENABLE: ${MAIL_STARTTLS_ENABLE:-true}
      MAIL_STARTTLS_REQUIRED: ${MAIL_STARTTLS_REQUIRED:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}

  # Frontend Angular (servi par nginx, proxy /api/v1 vers le backend)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  oracle-data:
  zk-data:
  zk-logs:
  kafka-data:
